name: Self-Healing CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  JENKINS_URL: ${{ vars.JENKINS_URL }}
  JENKINS_USER: ${{ vars.JENKINS_USER }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest tests/ -v

  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_url: ${{ steps.meta.outputs.ecr_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ECR_URL="${{ steps.login-ecr.outputs.registry }}/sample-app"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "ecr_url=${ECR_URL}"     >> $GITHUB_OUTPUT

      - run: |
          docker build \
            -t ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.image_tag }} \
            -t ${{ steps.meta.outputs.ecr_url }}:latest .
          docker push ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.image_tag }}
          docker push ${{ steps.meta.outputs.ecr_url }}:latest


